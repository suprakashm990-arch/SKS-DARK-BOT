name: 24/7 Telegram Bot Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Isse aap jab chahein manually bhi button daba kar bot chalu kar sakte hain
  schedule:
    # ⏱️ Trick: Yeh cron schedule har 5 ghante mein bot ko naye sirre se automatic chalu karega
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 🛑 5 Ghante (300 minutes) ka safe timeout, taaki 6 ghante wali GitHub limit se pehle bot khud restart ho jaye
    timeout-minutes: 300 

    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Libraries Install Karna
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Bot Chalu Karein
      env:
        TG_API_ID: ${{ secrets.TG_API_ID }}
        TG_API_HASH: ${{ secrets.TG_API_HASH }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      run: python bot.py
